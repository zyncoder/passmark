name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days at 06:00 UTC (11:30 AM IST)
    - cron: '0 6 */5 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to prevent inactivity pause..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Supabase is alive (HTTP $HTTP_STATUS)"
          else
            echo "❌ Supabase ping failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
